# ============================================================
# C2 Chat App - Server Configuration File
# ============================================================
# This file overrides default values inside server.py
# Modify values as needed and use /reload to apply changes
# ============================================================

[server]

# ─────────────────────────────────────────────
# Network Settings
# ─────────────────────────────────────────────
host = 0.0.0.0
port = 9999
max_clients = 20

# ─────────────────────────────────────────────
# Logging & Audit
# ─────────────────────────────────────────────
audit_log = chat_audit.log
audit_json = False

# ─────────────────────────────────────────────
# Message History
# ─────────────────────────────────────────────
max_history = 500

# ─────────────────────────────────────────────
# Rate Limiting (Anti-Spam Protection)
# ─────────────────────────────────────────────
rate_limit_burst = 8
rate_limit_window = 5

# ─────────────────────────────────────────────
# Remote Shell Settings
# ─────────────────────────────────────────────
rshell_timeout = 15

# ─────────────────────────────────────────────
# Server Message
# ─────────────────────────────────────────────
motd = Welcome to C2 Chat App - Authorized Use Only

# ─────────────────────────────────────────────
# Persistence Files
# ─────────────────────────────────────────────
banned_ips_file = banned_ips.txt
notes_file = operator_notes.json
